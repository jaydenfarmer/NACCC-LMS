
<router-outlet></router-outlet>

<!-- Sidebar flyout overlay rendered globally -->
@if (sidebarService.flyout().open && sidebarService.flyout().item) {
  <div class="sidebar-flyout-overlay"
      [ngStyle]="{ top: sidebarService.flyout().position.top + 'px', left: sidebarService.flyout().position.left + 'px' }"
      (mouseenter)="setFlyoutHover(true)"
      (mouseleave)="setFlyoutHover(false)"
      role="menu">
    <div class="flyout-header">{{ sidebarService.flyout().item!.label }}</div>
    <div class="flyout-items">
      @for (child of sidebarService.flyout().item!.children ?? []; track child.path) {
        <a [routerLink]="child.path" routerLinkActive="active" class="flyout-link" role="menuitem">
          <span class="flyout-icon">{{ child.icon }}</span>
          <span class="flyout-label">{{ child.label }}</span>
        </a>
      }
    </div>
  </div>
}
